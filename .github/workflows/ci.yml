name: ci

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: UI Native Parity Gate
        run: npm run parity:ui

      - name: Build
        run: npm run build

      - name: Upload UI test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-ui-native-parity-artifacts
          path: |
            test-results
            playwright-report
            test-results/ui-native-parity-html
