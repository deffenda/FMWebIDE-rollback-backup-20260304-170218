name: audit

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  parity-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate audit artifacts
        run: npm run audit:ci

      - name: Run parity harness smoke tests
        run: npm run test:parity

      - name: Run UI parity regression gate
        run: npm run parity:ui

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-artifacts
          path: docs/audit

      - name: Upload UI test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-native-parity-artifacts
          path: |
            test-results
            playwright-report
            test-results/ui-native-parity-html
